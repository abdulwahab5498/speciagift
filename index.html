<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Isn't Romantic? Really?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Screen Wrapper */
        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* Neon Borders for Screen 2 onwards */
        .neon-box {
            border: 4px solid;
            border-image: linear-gradient(to right, #ff0055, #00f3ff) 1;
            padding: 40px 20px;
            background: #050505;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3), 0 0 20px rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        /* Screen 1: Text Typing */
        .text-line {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            white-space: nowrap;
            overflow: hidden;
            margin: 15px auto;
            width: 0;
        }

        .typing-1 {
            animation: typing 2s steps(20) forwards;
        }

        .typing-2 {
            color: #ff0055;
            animation: typing 2s steps(20) 2.5s forwards;
        }

        .typing-3 {
            font-size: 32px;
            animation: typing 1.5s steps(10) 5s forwards;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* Card Elements */
        .card-title {
            color: #ff0055;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .card-sub {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px #fff;
        }

        /* Rose Animation Styles */
        .rose-container {
            margin: 20px auto;
            width: 100px;
            height: 150px;
            position: relative;
        }

        .stem {
            width: 4px;
            height: 100px;
            background-color: #0f9d58;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            transform-origin: bottom;
            transition: transform 1.5s ease-in-out;
        }

        .stem.grow {
            transform: translateX(-50%) scaleY(1);
        }

        .petal {
            width: 50px;
            height: 50px;
            background-color: #ff0055;
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: 15px;
            left: 25px;
            transform: scale(0);
            transform-origin: bottom center;
            transition: transform 1.5s ease-in-out 1.2s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 15px #ff0055;
        }

        .petal.bloom {
            transform: scale(1.3);
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            color: #ff0055;
            font-size: 20px;
            animation: floatUp 2s ease-in forwards;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
        }

        /* Letter Box Popup */
        .letter-box {
            background: #111;
            border: 1px solid #ff0055;
            padding: 25px;
            text-align: left;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
            max-width: 450px;
            margin: 0 auto;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            color: #aaa;
        }

        .letter-title {
            color: #ff0055;
            font-style: italic;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .letter-text {
            font-size: 14px;
            line-height: 1.6;
            color: #ddd;
            min-height: 120px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            background-color: #ff0055;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { background-color: transparent; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- SCREEN 1: Intro Text Animations -->
        <div id="screen1">
            <div class="text-line typing-1">CODING ISN'T ?</div>
            <div class="text-line typing-2">R♥MANTIC</div>
            <div class="text-line typing-3">REALLY ?</div>
        </div>

        <!-- SCREEN 2: Loading & Interactive Button -->
        <div id="screen2" class="neon-box hidden">
            <div class="card-title">Loading Love</div>
            <div class="card-sub">Celebrating heartbeat...</div>
            <button class="btn" id="bloomBtn">Tap to bloom for love ♥</button>
        </div>

        <!-- SCREEN 3: Rose Blooming Display -->
        <div id="screen3" class="neon-box hidden">
            <div class="rose-container">
                <div class="petal" id="petal"></div>
                <div class="stem" id="stem"></div>
            </div>
            <div class="card-sub" style="margin-top:20px;">EVERY PETAL BLOOMS WITH LOVE</div>
            <div class="card-title" style="font-size:28px; margin-bottom:25px;">for love ♥</div>
            <button class="btn" id="readBtn">📖 Read my note</button>
        </div>

        <!-- SCREEN 4: Final Romantic Letter Popup -->
        <div id="screen4" class="letter-box hidden">
            <span class="close-btn" id="closeBtn">×</span>
            <div class="letter-title">Dear Love,</div>
            <div class="letter-text" id="typewriterText"></div><span class="cursor" id="letterCursor"></span>
        </div>

    </div>

    <script>
        // Screen Timing Transitions
        setTimeout(() => {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
        }, 7500); // Transitions to button layout after text animations complete

        // Button Click - Bloom Rose Action
        const bloomBtn = document.getElementById('bloomBtn');
        bloomBtn.addEventListener('click', () => {
            // Heart Burst Effect
            for(let i=0; i<8; i++) {
                createHeart(bloomBtn);
            }

            setTimeout(() => {
                document.getElementById('screen2').classList.add('hidden');
                document.getElementById('screen3').classList.remove('hidden');
                
                // Trigger Rose Growth Animations
                setTimeout(() => {
                    document.getElementById('stem').classList.add('grow');
                    document.getElementById('petal').classList.add('bloom');
                }, 200);
            }, 600);
        });

        // Floating Hearts Logic
        function createHeart(element) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '♥';
            heart.style.left = (element.offsetLeft + element.offsetWidth/2 + (Math.random() * 60 - 30)) + 'px';
            heart.style.top = (element.offsetTop - 10) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 2000);
        }

        // Letter Generation & Typewriter Setup
        const romanticNote = "Every single line of this code was written with you in my heart. Just like this digital rose, my love for you blooms uniquely, growing stronger and more beautiful with every passing moment.\n\nYou are the brightness in my thoughts, the rhythm in my heart, and the warmth in my life. This rose is a small reflection of my feelings—timeless, true, and forever yours.\n\nYours forever. ♥";
        
        const readBtn = document.getElementById('readBtn');
        readBtn.addEventListener('click', () => {
            document.getElementById('screen3').classList.add('hidden');
            document.getElementById('screen4').classList.remove('hidden');
            typeWriter(romanticNote, 0);
        });

        function typeWriter(text, i) {
            if (i < text.length) {
                if(text.charAt(i) === '\n') {
                    document.getElementById("typewriterText").innerHTML += '<br>';
                } else {
                    document.getElementById("typewriterText").innerHTML += text.charAt(i);
                }
                setTimeout(() => { typeWriter(text, i + 1); }, 40);
            } else {
                document.getElementById('letterCursor').style.display = 'none';
            }
        }

        // Close Letter Option
        document.getElementById('closeBtn').addEventListener('click', () => {
            document.getElementById('screen4').classList.add('hidden');
            document.getElementById('screen3').classList.remove('hidden');
            document.getElementById("typewriterText").innerHTML = "";
            document.getElementById('letterCursor').style.display = 'inline-block';
        });
    </script>
</body>
</html>
